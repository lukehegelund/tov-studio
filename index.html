<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOV Studio</title>
<style>
  :root{
    --green:#1A5E3A; --green-d:#124229; --bg:#0f1410; --card:#1a211b; --line:#2c3a2f;
    --txt:#e8efe9; --mut:#9fb3a4; --gold:#F59E0B; --red:#DC2626; --blue:#5b9bd5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  a{color:var(--blue)}
  /* login */
  #login{max-width:360px;margin:14vh auto;padding:28px;background:var(--card);border:1px solid var(--line);border-radius:14px}
  #login h1{font-size:22px;color:var(--green);margin-bottom:4px}
  #login p{color:var(--mut);margin-bottom:18px;font-size:13px}
  input{width:100%;padding:11px 12px;margin:6px 0;background:#0f1410;border:1px solid var(--line);border-radius:9px;color:var(--txt);font-size:15px}
  button{cursor:pointer;border:0;border-radius:9px;font-weight:600;font-size:14px}
  .btn{background:var(--green);color:#fff;padding:11px 14px;width:100%}
  .btn:hover{background:var(--green-d)}
  .err{color:var(--red);font-size:13px;min-height:18px}
  /* app */
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header .brand{font-weight:700;color:var(--green);font-size:18px;letter-spacing:.5px}
  header .brand span{color:var(--mut);font-weight:400;font-size:12px;margin-left:8px}
  .logout{background:transparent;color:var(--mut);padding:6px 10px;border:1px solid var(--line)}
  nav{display:flex;gap:4px;padding:10px 14px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:4}
  nav button{background:transparent;color:var(--mut);padding:8px 14px;white-space:nowrap;border-radius:8px}
  nav button.on{background:var(--green);color:#fff}
  main{max-width:1000px;margin:0 auto;padding:18px 14px 80px}
  section{display:none} section.on{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .stat.g .n{color:var(--gold)} .stat.green .n{color:#4ade80} .stat.r .n{color:var(--red)}
  h2{font-size:15px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .pill{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
  .New{background:#1e3a5f;color:#9cc4 f0} .Drafted{background:#4a3a14;color:var(--gold)}
  .Responded{background:#14324a;color:var(--blue)} .Booked{background:#14422a;color:#4ade80}
  .Declined{background:#3a1a1a;color:#f08a8a} .NoResponse{background:#333;color:#aaa}
  .muted{color:var(--mut);font-size:13px}
  .draft{background:#0f1410;border:1px dashed var(--line);border-radius:9px;padding:10px;margin-top:8px;font-size:13px;white-space:pre-wrap;color:#cfe0d3}
  .mini{padding:7px 11px;font-size:13px;width:auto;background:var(--green);color:#fff;margin-top:8px}
  .mini.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase}
  .cmd{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;max-width:1000px;margin:0 auto}
  .cmd input{margin:0}
  .cmd button{width:auto;padding:0 18px;background:var(--green);color:#fff}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:24px;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login">
  <h1>TOV Studio</h1>
  <p>Take One Visuals — client command center</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button class="btn" onclick="signIn()">Sign in</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="brand">TOV STUDIO <span id="hello"></span></div>
    <button class="logout" onclick="signOut()">Sign out</button>
  </header>
  <nav>
    <button class="on" data-tab="dash" onclick="tab('dash',this)">Dashboard</button>
    <button data-tab="leads" onclick="tab('leads',this)">Leads</button>
    <button data-tab="clients" onclick="tab('clients',this)">Clients</button>
    <button data-tab="money" onclick="tab('money',this)">Finances</button>
  </nav>
  <main>
    <section id="dash" class="on">
      <div class="grid" id="stats"></div>
      <h2>Needs your approval</h2>
      <div id="approvals"></div>
    </section>
    <section id="leads">
      <h2>Inquiry pipeline</h2>
      <div id="leadList"></div>
    </section>
    <section id="clients">
      <h2>Clients</h2>
      <div class="card"><table id="clientTbl"></table></div>
    </section>
    <section id="money">
      <div class="grid" id="moneyStats"></div>
      <h2>Recent payments</h2>
      <div class="card"><table id="payTbl"></table></div>
      <h2>Recent expenses</h2>
      <div class="card"><table id="expTbl"></table></div>
    </section>
  </main>
  <div class="cmd">
    <input id="cmdBox" placeholder="Tell the agent what to do…  e.g. 'draft a reply to Yasaman'">
    <button onclick="sendCmd()">Send</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://oncsydqymaohrzertxln.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uY3N5ZHF5bWFvaHJ6ZXJ0eGxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTc1NjgsImV4cCI6MjA5NzczMzU2OH0.bBbl7jgS3kAoVpPkQyT_7iEEZpBzx_6Y73J78vpcnJs";
const sb = supabase.createClient(SB_URL, SB_ANON);
const $=id=>document.getElementById(id);
const money=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

async function signIn(){
  $('loginErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('pw').value});
  if(error){$('loginErr').textContent=error.message;return;}
  boot();
}
async function signOut(){await sb.auth.signOut();location.reload();}
function tab(id,el){document.querySelectorAll('section').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  $(id).classList.add('on');el.classList.add('on');}

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){$('login').style.display='block';$('app').style.display='none';return;}
  $('login').style.display='none';$('app').style.display='block';
  $('hello').textContent='· '+session.user.email;
  loadAll();
}

async function loadAll(){
  const [{data:inq},{data:cl},{data:pay},{data:exp},{data:msgs}] = await Promise.all([
    sb.from('inquiries').select('*').order('created_at',{ascending:false}),
    sb.from('clients').select('*').order('wedding_date',{ascending:false}),
    sb.from('payments').select('*').order('date',{ascending:false}),
    sb.from('expenses').select('*').order('date',{ascending:false}),
    sb.from('messages').select('*').eq('status','draft').order('created_at',{ascending:false}),
  ]);
  renderStats(inq,cl,pay,exp,msgs);
  renderApprovals(msgs,inq);
  renderLeads(inq);
  renderClients(cl);
  renderMoney(pay,exp);
}

function renderStats(inq,cl,pay,exp,msgs){
  const newLeads=inq.filter(i=>['New','Drafted'].includes(i.status)).length;
  const booked=cl.filter(c=>['Booked','InProduction'].includes(c.status)).length;
  const income=pay.reduce((s,p)=>s+Number(p.amount),0);
  const balance=cl.reduce((s,c)=>s+Number(c.balance_due||0),0);
  $('stats').innerHTML=[
    ['g',newLeads,'Open leads'],['',msgs.length,'Drafts to review'],
    ['green',booked,'Booked'],['green',money(income),'Income (tracked)'],
    ['r',money(balance),'Balance due'],
  ].map(([c,n,l])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}

function renderApprovals(msgs,inq){
  if(!msgs.length){$('approvals').innerHTML='<div class="card muted">Nothing waiting. The agent will drop new drafts here after each inbox scan.</div>';return;}
  $('approvals').innerHTML=msgs.map(m=>{
    const who=(inq.find(i=>i.id===m.inquiry_id)||{}).name||m.to_address||'Lead';
    return `<div class="card"><div class="row"><b>${who}</b><span class="pill Drafted">DRAFT · ${m.template_used||''}</span></div>
      <div class="muted">${m.subject||''}</div>
      <div class="draft">${(m.body||'').replace(/</g,'&lt;')}</div>
      <button class="mini" onclick="approve(${m.id},'${who}')">✓ Approve → create Gmail draft</button>
      <button class="mini ghost" onclick="discard(${m.id})">Discard</button></div>`;
  }).join('');
}

function renderLeads(inq){
  $('leadList').innerHTML=inq.map(i=>`<div class="card"><div class="row">
    <div><b>${i.name||'—'}</b><div class="muted">${i.venue||'venue TBD'} · ${i.wedding_date||'date TBD'} · ${i.source||''}</div></div>
    <span class="pill ${i.status}">${i.status}</span></div>
    ${i.message?`<div class="muted" style="margin-top:6px">${(i.message||'').slice(0,140).replace(/</g,'&lt;')}</div>`:''}</div>`).join('');
}

function renderClients(cl){
  $('clientTbl').innerHTML='<tr><th>Client</th><th>Date</th><th>Package</th><th>Status</th><th>Paid</th><th>Balance</th></tr>'+
    cl.map(c=>`<tr><td>${c.name}</td><td>${c.wedding_date||'—'}</td><td>${(c.package||'').slice(0,22)}</td>
      <td><span class="pill ${['Booked','InProduction'].includes(c.status)?'Booked':'NoResponse'}">${c.status}</span></td>
      <td>${money(c.total_paid)}</td><td>${Number(c.balance_due)>0?money(c.balance_due):'—'}</td></tr>`).join('');
}

function renderMoney(pay,exp){
  const inc=pay.reduce((s,p)=>s+Number(p.amount),0), ex=exp.reduce((s,e)=>s+Number(e.amount),0);
  $('moneyStats').innerHTML=[
    ['green',money(inc),'Income'],['r',money(ex),'Expenses'],['g',money(inc-ex),'Net']
  ].map(([c,n,l])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  $('payTbl').innerHTML='<tr><th>Date</th><th>Description</th><th>Amount</th></tr>'+
    pay.slice(0,15).map(p=>`<tr><td>${p.date}</td><td>${(p.notes||p.type||'').slice(0,40)}</td><td>${money(p.amount)}</td></tr>`).join('');
  $('expTbl').innerHTML='<tr><th>Date</th><th>Description</th><th>Cat</th><th>Amount</th></tr>'+
    exp.slice(0,15).map(e=>`<tr><td>${e.date}</td><td>${(e.description||'').slice(0,34)}</td><td>${(e.category||'').slice(0,14)}</td><td>${money(e.amount)}</td></tr>`).join('');
}

async function approve(msgId,who){
  await sb.from('messages').update({status:'approved',approved_at:new Date().toISOString()}).eq('id',msgId);
  await sb.from('command_queue').insert({command:'push_draft:'+msgId});
  toast('Approved — agent will create the Gmail draft for '+who);
  loadAll();
}
async function discard(msgId){
  await sb.from('messages').update({status:'discarded'}).eq('id',msgId);
  toast('Discarded');loadAll();
}
async function sendCmd(){
  const v=$('cmdBox').value.trim();if(!v)return;
  await sb.from('command_queue').insert({command:v});
  $('cmdBox').value='';toast('Sent to agent');
}
$('cmdBox')&&$('cmdBox').addEventListener('keydown',e=>{if(e.key==='Enter')sendCmd();});
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')signIn();});
boot();
</script>
</body>
</html>
